# ============================================================================
# Find And Study — Nginx ters proxy
# Domain: findandstudy.com (kendi domain'inizle değiştirin)
# ============================================================================

# HTTP → HTTPS yönlendirme + Let's Encrypt webroot
server {
    listen 80;
    listen [::]:80;
    server_name findandstudy.com www.findandstudy.com;

    # Let's Encrypt sertifika yenileme
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer her şeyi HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS sunucu
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name findandstudy.com www.findandstudy.com;

    # SSL (Let's Encrypt — ilk çalıştırmadan sonra bu dosyalar oluşur)
    ssl_certificate /etc/letsencrypt/live/findandstudy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/findandstudy.com/privkey.pem;

    # Modern TLS ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Güvenlik başlıkları (uygulama da bazılarını gönderiyor; nginx katmanı yedek)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Yükleme limitleri (knowledge file upload 50MB'a kadar destekliyor)
    client_max_body_size 60M;
    client_body_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brute-force koruması için rate limit (login + signup)
    location ~ ^/api/(login|signup|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://app:5000;
        include /etc/nginx/proxy_params.conf;
    }

    # Genel API rate limit (düzenli kullanıcılar için)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # Yüklenen statik dosyalar — uygulama bypass'lı, daha hızlı
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        # Sızıntıyı önlemek için tehlikeli uzantıları engelle
        location ~ \.(php|exe|sh|js|html|htm)$ {
            deny all;
        }
    }

    # Frontend (Vite build çıktısı uygulamadan servis ediliyor)
    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }
}
