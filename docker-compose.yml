# ============================================================================
# Find And Study — Docker Compose (Hostinger VPS için üretim kurulumu)
# ============================================================================
# Kullanım:
#   1) .env.production dosyasını oluşturun (örnek: .env.production.example)
#   2) docker compose --env-file .env.production up -d --build
#   3) İlk kez: docker compose exec app npm run db:push
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: findandstudy
      POSTGRES_USER: ${POSTGRES_USER:-findandstudy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findandstudy_user} -d findandstudy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Postgres'i sadece iç ağa açık tut — dışarıdan erişilemez
    expose:
      - "5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-findandstudy_user}:${POSTGRES_PASSWORD}@postgres:5432/findandstudy
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in .env.production}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?ALLOWED_ORIGIN must be set}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Find & Study Academy}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - internal
      - web
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/findandstudy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
