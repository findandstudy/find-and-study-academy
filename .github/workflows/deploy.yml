name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Aynı anda iki deploy çalışmasın
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync release to VPS
        env:
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          # Sürüm klasörünü zaman damgasıyla oluştur
          RELEASE=$(date +%Y%m%d%H%M%S)
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          REMOTE_BASE=/var/www/findandstudy
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p $REMOTE_BASE/releases/$RELEASE"
          rsync -az --delete \
            --exclude='.git' --exclude='node_modules' --exclude='.github' \
            --exclude='attached_assets' --exclude='*.png' --exclude='*.pdf' \
            --exclude='public/uploads' \
            ./ "$VPS_USER@$VPS_HOST:$REMOTE_BASE/releases/$RELEASE/"

      - name: Run remote release script
        env:
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd /var/www/findandstudy && bash releases/${{ env.RELEASE }}/scripts/release.sh ${{ env.RELEASE }}"

      - name: Smoke test
        run: |
          sleep 5
          curl -fsS --max-time 10 https://${{ vars.PRODUCTION_DOMAIN }}/api/health || exit 1
